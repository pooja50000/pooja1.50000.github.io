<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pooja's Portfolio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap');

    body {
      font-family: 'DM Sans', Arial, sans-serif;
      background: linear-gradient(to right, #ffe4f0 50%, #e4eeff 50%);
      color: #222;
      text-align: center;
      padding: 60px 40px;
      margin: 0;
    }

    h1 { color: #5a5aff; }

    /**
    nav {
      margin-bottom: 30px;
    }

    nav a {
      display: inline-block;
      margin: 0 12px;
      padding: 10px 14px;
      border-radius: 10px;
      color: #5a5aff;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #dadaff;
      background: white;
      transition: background 0.2s, box-shadow 0.2s;
    }

    nav a:hover {
      background: #f0f0ff;

    **/

    .card {
      max-width: 700px;
      margin: 0 auto 40px auto;
      background: white;
      padding: 28px;
      border-radius: 16px;
      border: 1px solid #eee;
    }

    .links a {
      margin: 0 10px;
      color: #5a5aff;
      text-decoration: none;
      font-weight: 500;
    }

    .links a:hover {
      text-decoration: underline;
    }

    /* Big nav boxes */
    .nav-boxes {
      max-width: 700px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .nav-box {
      background: white;
      border: 1px solid #dadaff;
      border-radius: 16px;
      padding: 36px 20px;
      text-decoration: none;
      color: #5a5aff;
      font-weight: 600;
      font-size: 1.1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }

    .nav-box:hover {
      background: #f0f0ff;
      box-shadow: 0 4px 16px rgba(90,90,255,0.15);
      transform: translateY(-3px);
    }

    .nav-box .icon {
      font-size: 2rem;
    }

    .nav-box .label {
      font-size: 1rem;
      color: #444;
      font-weight: 400;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    @media (max-width: 560px) {
      .nav-boxes {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Welcome to Pooja's Portfolio 🌸</h1>
    
    <p>More updates coming soon...</p>
    <div class="links">
      
      <a href="https://github.com/pooja50000" target="_blank" rel="noopener noreferrer">Visit my GitHub</a>
    </div>
  </div>

  

  <!-- Big navigation boxes -->
  <div class="nav-boxes">
    <a href="index.html" class="nav-box">
      <span class="icon">🏠</span>
      Home
      <span class="label">Back to start</span>
    </a>
    <a href="aboutme.html" class="nav-box">
      <span class="icon">👩‍💻</span>
      About Me
      <span class="label">My story & skills</span>
    </a>
    <a href="projects.html" class="nav-box">
      <span class="icon">🗂️</span>
      Projects
      <span class="label">What I've built</span>
    </a>
  </div>

</body>
</html>
